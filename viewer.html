<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gonioscopy — angle viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #stage { position: relative; width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
  #stage.dragging { cursor: grabbing; }
  canvas { display: block; width: 100%; height: 100%; }
  /* soft lens vignette: reinforces the round-goniolens look and masks the
     corners that a rotating frame would otherwise reveal */
  #vignette { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 72% 78% at 50% 50%,
      rgba(0,0,0,0) 54%, rgba(0,0,0,0.55) 76%, rgba(0,0,0,0.96) 92%, #000 100%); }
  #hud { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 22px 22px;
    pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.55), transparent); }
  #label { color: #f2f2f2; font-size: 15px; font-weight: 500; letter-spacing: 0.4px;
    text-align: center; margin-bottom: 12px; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
  #track { position: relative; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.18);
    max-width: 520px; margin: 0 auto; }
  #fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px;
    background: rgba(255,255,255,0.85); width: 0; }
  #hint { color: rgba(255,255,255,0.5); font-size: 12px; text-align: center; margin-top: 10px; }
  #calib { position: fixed; left: 12px; top: 12px; z-index: 6; display: none; pointer-events: none;
    font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.5; color: #eee;
    background: rgba(15,15,18,0.8); border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 8px; padding: 10px 12px; white-space: pre; }
  #calib b { color: #ffd27a; font-weight: 500; }
  #hoverlabel { position: fixed; transform: translate(14px, -50%); pointer-events: none;
    padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: #fff;
    background: rgba(20,20,22,0.82); border: 0.5px solid rgba(255,255,255,0.18);
    opacity: 0; transition: opacity 0.12s; white-space: nowrap; z-index: 5; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="vignette"></div>
  <div id="hoverlabel"></div>
  <div id="calib"></div>
  <div id="hud">
    <div id="label">—</div>
    <div id="track"><div id="fill"></div></div>
    <div id="hint">drag or scroll to rotate around the angle</div>
  </div>
</div>
<script src="viewer.js"></script>
</body>
</html>
